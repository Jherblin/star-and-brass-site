<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star & Brass Group</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      html, body { height: 100%; }
      body {
        background: #ffffff;
        color: #0a0a0a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .no-select { -webkit-user-select: none; user-select: none; }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 999px; }
      ::-webkit-scrollbar-track { background: #f5f5f5; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      function renderFatalError(err) {
        const root = document.getElementById("root");
        if (!root) return;
        const msg = (err && (err.stack || err.message)) || String(err || "Unknown error");
        root.innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#fff;color:#111;font-family:Inter,system-ui,sans-serif;">
            <div style="max-width:960px;width:100%;border:1px solid rgba(0,0,0,.12);border-radius:24px;padding:24px;">
              <div style="font-weight:800;font-size:18px;margin-bottom:12px;">Site render error</div>
              <pre style="white-space:pre-wrap;word-break:break-word;margin:0;padding:16px;border-radius:16px;background:#f7f7f7;border:1px solid rgba(0,0,0,.08);font-size:12px;line-height:1.4;">${msg}</pre>
            </div>
          </div>
        `;
      }

      try {
        const { useMemo, useState } = React;

        function cn() {
          return Array.prototype.slice.call(arguments).filter(Boolean).join(" ");
        }

        const BRAND = {
          name: "Star & Brass Group",
          city: "Dallas-based | Serving DFW",
          phoneDisplay: "(469) 265-4633",
          phoneHref: "tel:+14692654633",
          emailDisplay: "Jimmy@StarAndBrassGroup.com",
          emailHref: "mailto:Jimmy@StarAndBrassGroup.com",
          websiteDisplay: "www.StarAndBrassGroup.com",
          websiteHref: "https://www.StarAndBrassGroup.com",
          serviceArea: "Luxury custom residential projects across DFW",
          contacts: [
            {
              name: "Jimmy Herblin",
              title: "Chief Executive Officer",
              phoneDisplay: "(469) 265-4633",
              phoneHref: "tel:+14692654633",
              emailDisplay: "Jimmy@StarAndBrassGroup.com",
              emailHref: "mailto:Jimmy@StarAndBrassGroup.com",
            },
            {
              name: "Cyle Burton",
              title: "Chief Operating Officer",
              phoneDisplay: "(951) 514-0203",
              phoneHref: "tel:+19515140203",
              emailDisplay: "Cyle@StarAndBrassGroup.com",
              emailHref: "mailto:Cyle@StarAndBrassGroup.com",
            }
          ]
        };

        const ASSETS = {
          video: "estate-sweep.mp4",
          concepts: {
            material: "material.jpg",
            elevation: "Elevation.jpg",
            lighting: "lighting.jpg",
            kitchen: "Kitchen.jpg",
            bath: "Bath.jpg",
            outdoor: "outdoor.jpg",
          },
        };

        const COPY = {
          summary: "Star & Brass Group is a Dallas-based luxury custom homebuilder serving the broader DFW market. Founded by Marine Corps veterans Jimmy Herblin and Cyle Burton, the company is purpose-built for high-end custom homes, with a focus on protecting design intent, maintaining disciplined budgets and schedules, and delivering a building experience that serves both architects and clients well.",
          heroHeadline: "Disciplined approach to luxury custom home projects.",
          heroBody: "Star & Brass Group is built around a simple belief: exceptional homes require exceptional management. We bring structure to custom projects through strong preconstruction, clear budgeting, schedule discipline, and field execution that protects both design intent and owner experience.",
          approachBody: "Our role is to function as a builder-partner that brings clarity to complex projects, identifies risk early, and creates a more professional building experience from preconstruction through closeout.",
        };

        const Icon = {
          ArrowRight: (p) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
              <path d="M5 12h14" />
              <path d="M13 5l7 7-7 7" />
            </svg>
          ),
          Phone: (p) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
              <path d="M22 16.9v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.18 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.72c.12.86.3 1.7.54 2.5a2 2 0 0 1-.45 2.11L8.1 9.9a16 16 0 0 0 6 6l1.57-1.1a2 2 0 0 1 2.11-.45c.8.24 1.64.42 2.5.54A2 2 0 0 1 22 16.9z" />
            </svg>
          ),
          Mail: (p) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
              <path d="M4 4h16v16H4z" />
              <path d="M22 6l-10 7L2 6" />
            </svg>
          ),
          Globe: (p) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
          ),
          Check: (p) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
              <path d="M20 6L9 17l-5-5" />
            </svg>
          ),
        };

        function Button({ variant = "primary", href, onClick, className = "", children }) {
          const base = "inline-flex items-center justify-center gap-2 rounded-full px-5 py-3 text-sm font-semibold transition no-select";
          const styles = {
            primary: "bg-black text-white hover:bg-neutral-800",
            ghost: "border border-black/15 bg-white text-black hover:bg-neutral-100",
          };
          const Comp = href ? "a" : "button";
          return (
            <Comp href={href} onClick={onClick} className={cn(base, styles[variant], className)}>
              {children}
            </Comp>
          );
        }

        const Divider = () => <div className="mx-auto h-px max-w-[88rem] bg-black/10" />;

        const Card = ({ children, className = "" }) => (
          <div className={cn("rounded-[28px] border border-black/10 bg-white", className)}>{children}</div>
        );

        function SectionWrap({ eyebrow, title, subtitle, children, right }) {
          return (
            <div className="mx-auto max-w-[88rem] px-4 py-14 md:py-16">
              <div className="grid gap-8 md:grid-cols-2 md:items-end">
                <div>
                  <div className="text-[11px] uppercase tracking-[0.22em] text-black/45">{eyebrow}</div>
                  <h2 className="mt-3 text-3xl font-semibold tracking-tight md:text-4xl">{title}</h2>
                  {subtitle ? <p className="mt-4 max-w-2xl text-base leading-relaxed text-black/65">{subtitle}</p> : null}
                </div>
                {right ? <div className="md:justify-self-end">{right}</div> : null}
              </div>
              <div className="mt-8">{children}</div>
            </div>
          );
        }

        function PlaceholderBlock({ title, body, tall = false }) {
          return (
            <Card className={cn("p-6", tall ? "min-h-[340px]" : "min-h-[220px]")}>
              <div className="flex h-full flex-col justify-between">
                <div>
                  <div className="text-sm font-semibold uppercase tracking-[0.18em] text-black/45">Under construction</div>
                  <div className="mt-4 text-xl font-semibold">{title}</div>
                  <p className="mt-3 max-w-xl text-sm leading-relaxed text-black/65">{body}</p>
                </div>
              </div>
            </Card>
          );
        }

        function ImageWithFallback({ src, alt, label }) {
          const [ok, setOk] = useState(true);
          return (
            <div className="absolute inset-0">
              {ok ? (
                <img
                  src={src}
                  alt={alt}
                  className="h-full w-full object-cover"
                  loading="lazy"
                  onError={() => setOk(false)}
                />
              ) : (
                <div className="flex h-full w-full items-center justify-center bg-neutral-100 text-sm uppercase tracking-[0.16em] text-black/40">
                  {label}
                </div>
              )}
            </div>
          );
        }

        function ConceptGallery() {
          const items = [
            ["Material direction", ASSETS.concepts.material, "material.jpg"],
            ["Elevation planning", ASSETS.concepts.elevation, "Elevation.jpg"],
            ["Lighting plan", ASSETS.concepts.lighting, "lighting.jpg"],
            ["Kitchen concepts", ASSETS.concepts.kitchen, "Kitchen.jpg"],
            ["Bath concepts", ASSETS.concepts.bath, "Bath.jpg"],
            ["Outdoor living", ASSETS.concepts.outdoor, "outdoor.jpg"],
          ];

          return (
            <div className="grid gap-4 md:grid-cols-3">
              {items.map(([title, src, label]) => (
                <Card key={title} className="overflow-hidden">
                  <div className="relative aspect-[4/3] w-full overflow-hidden bg-neutral-100">
                    <ImageWithFallback src={src} alt={title} label={label} />
                  </div>
                  <div className="p-5">
                    <div className="text-sm font-semibold">{title}</div>
                  </div>
                </Card>
              ))}
            </div>
          );
        }

        function ProcessCards() {
          const rows = [
            {
              k: "Preconstruction",
              v: "Detailed review of plans, scope, allowances, likely cost drivers, and coordination gaps before they become expensive."
            },
            {
              k: "Budget discipline",
              v: "Budgets are built from actual scope, current trade pricing, and realistic finish expectations, then updated throughout the project."
            },
            {
              k: "Field execution",
              v: "Trades perform better on jobs that are organized and led well. We emphasize preparation, sequencing, accountability, and clean follow-through."
            },
            {
              k: "Owner experience",
              v: "Direct communication, regular updates, and a project team that keeps decisions moving without creating chaos."
            },
          ];

          return (
            <div className="grid gap-4">
              {rows.map((r) => (
                <Card key={r.k} className="p-5">
                  <div className="text-sm font-semibold">{r.k}</div>
                  <div className="mt-2 text-sm leading-relaxed text-black/65">{r.v}</div>
                </Card>
              ))}
            </div>
          );
        }

        function StandardsGrid() {
          const items = [
            ["Scope clarity", "Detailed redline reviews and assumptions routed back to architect, interior designer, landscape architect, and engineers for direction."],
            ["Bid coordination", "Multiple bids leveled apples-to-apples across labor, materials, schedule duration, and trade partner track record."],
            ["Allowances", "Reduce allowances wherever possible and convert them into approved selections early to protect budget and schedule."],
            ["Change orders", "No work stops, changes, or gets redirected until a formal change order is approved reflecting both cost and schedule impact."],
            ["Schedule discipline", "Defined sequences, contractual duration expectations, and active management to avoid resequencing, trade stacking, and momentum loss."],
            ["Quality standards", "Long-term trade relationships, building science fundamentals, and expectations that extend beyond what is immediately visible."],
          ];

          return (
            <div className="grid gap-4 md:grid-cols-2">
              {items.map(([t, d]) => (
                <Card key={t} className="p-6">
                  <div className="text-sm font-semibold">{t}</div>
                  <div className="mt-2 text-sm leading-relaxed text-black/65">{d}</div>
                </Card>
              ))}
            </div>
          );
        }

        function Bios() {
          return (
            <div className="grid gap-6 md:grid-cols-2">
              <Card className="p-6">
                <div className="text-xl font-semibold">Jimmy Herblin</div>
                <div className="mt-1 text-sm uppercase tracking-[0.16em] text-black/45">Chief Executive Officer</div>
                <p className="mt-4 text-sm leading-relaxed text-black/65">
                  Jimmy is a Marine Corps veteran who brings broad construction experience spanning remodels, additions, semi-custom production townhomes, semi-custom production single-family homes, and luxury custom residential projects. He holds a Bachelor of Science from Texas A&amp;M University and an MBA from Southern Methodist University, and approaches construction with a strong respect for building science, proper material application, and long-term durability.
                </p>
              </Card>
              <Card className="p-6">
                <div className="text-xl font-semibold">Cyle Burton</div>
                <div className="mt-1 text-sm uppercase tracking-[0.16em] text-black/45">Chief Operating Officer</div>
                <p className="mt-4 text-sm leading-relaxed text-black/65">
                  Cyle is a retired Marine Corps Sergeant Major and Bronze Star recipient with Valor. He brings significant construction experience across semi-custom production townhomes, luxury custom homes, multifamily, and light commercial work, along with a leadership style grounded in accountability, resourcefulness, follow-through, and strong relationship building under demanding conditions.
                </p>
              </Card>
            </div>
          );
        }

        function ContactCards() {
          return (
            <div className="grid gap-6 md:grid-cols-2">
              {BRAND.contacts.map((c) => (
                <Card key={c.name} className="p-6">
                  <div className="text-xl font-semibold">{c.name}</div>
                  <div className="mt-1 text-sm uppercase tracking-[0.16em] text-black/45">{c.title}</div>
                  <div className="mt-5 grid gap-4 text-sm">
                    <a href={c.phoneHref} className="flex items-center gap-3 text-black/75 hover:text-black">
                      <Icon.Phone className="h-5 w-5" />
                      <span>{c.phoneDisplay}</span>
                    </a>
                    <a href={c.emailHref} className="flex items-center gap-3 text-black/75 hover:text-black">
                      <Icon.Mail className="h-5 w-5" />
                      <span>{c.emailDisplay}</span>
                    </a>
                  </div>
                </Card>
              ))}
            </div>
          );
        }

        function VideoSection() {
          return (
            <div className="grid gap-6 md:grid-cols-[1.4fr_.9fr]">
              <Card className="overflow-hidden">
                <div className="aspect-video w-full bg-black">
                  <video
                    className="h-full w-full object-cover"
                    src={ASSETS.video}
                    autoPlay
                    loop
                    muted
                    playsInline
                    preload="auto"
                  ></video>
                </div>
              </Card>
              <PlaceholderBlock
                title="Extended visual direction reel"
                body="A longer visual reel will be added later."
                tall
              />
            </div>
          );
        }

        function MaterialsPlaceholder() {
          return (
            <PlaceholderBlock
              title="Building materials and assemblies"
              body="This section stays as a placeholder for now. It can later be expanded into a stronger materials, assemblies, and building science section once you are ready to build it out."
              tall
            />
          );
        }

        function HomePage({ go }) {
          return (
            <>
              <div className="mx-auto max-w-[88rem] px-4 pb-14 pt-10 md:pb-20 md:pt-16">
                <div className="grid gap-10 md:grid-cols-[1.15fr_.85fr] md:items-center">
                  <div>
                    <div className="text-[11px] uppercase tracking-[0.22em] text-black/45">Dallas-based | Serving DFW</div>
                    <h1 className="mt-4 max-w-4xl text-4xl font-semibold leading-[1.02] tracking-tight md:text-6xl">{COPY.heroHeadline}</h1>
                    <p className="mt-6 max-w-2xl text-base leading-relaxed text-black/68 md:text-lg">{COPY.heroBody}</p>
                    <div className="mt-8 flex flex-col gap-3 sm:flex-row">
                      <Button variant="primary" onClick={() => go("contact")}>Start a conversation <Icon.ArrowRight className="h-4 w-4" /></Button>
                      <Button variant="ghost" onClick={() => go("approach")}>How we work</Button>
                    </div>
                  </div>

                  <Card className="p-6 md:p-8">
                    <div className="text-[11px] uppercase tracking-[0.22em] text-black/45">Positioning</div>
                    <p className="mt-4 text-base leading-relaxed text-black/72">{COPY.summary}</p>
                    <div className="mt-6 grid gap-3 text-sm text-black/72">
                      <div className="flex items-start gap-3"><Icon.Check className="mt-0.5 h-4 w-4 shrink-0" /><span>Luxury custom focus throughout DFW.</span></div>
                      <div className="flex items-start gap-3"><Icon.Check className="mt-0.5 h-4 w-4 shrink-0" /><span>Built to be a trusted builder-partner for architects designing in the same price tier of homes we intend to build.</span></div>
                      <div className="flex items-start gap-3"><Icon.Check className="mt-0.5 h-4 w-4 shrink-0" /><span>Disciplined preconstruction, budgeting, and field execution designed to protect design intent and owner experience.</span></div>
                    </div>
                  </Card>
                </div>
              </div>

              <Divider />

              <SectionWrap
                eyebrow="Visual direction"
                title="A concept of the capability and standard of our finished products"
                subtitle="Below is a visual concept of the level of home and finish quality Star & Brass Group is accustomed to building."
                right={<Button variant="ghost" onClick={() => go("contact")}>Contact us <Icon.ArrowRight className="h-4 w-4" /></Button>}
              >
                <div className="grid gap-6">
                  <VideoSection />
                  <Card className="p-6 md:p-8">
                    <div className="text-sm font-semibold uppercase tracking-[0.18em] text-black/45">Under construction</div>
                    <p className="mt-4 max-w-3xl text-sm leading-relaxed text-black/65">
                      Check back later for more information on material direction, elevation planning, lighting plan, kitchen concepts, bath concepts, and outdoor living.
                    </p>
                    <div className="mt-6">
                      <ConceptGallery />
                    </div>
                  </Card>
                </div>
              </SectionWrap>
            </>
          );
        }

        function ApproachPage({ go }) {
          return (
            <SectionWrap
              eyebrow="Approach"
              title="How we run work"
              subtitle="Predictable outcomes come from disciplined systems, strong communication, and early identification of risk."
              right={<Button variant="ghost" onClick={() => go("contact")}>Start a conversation <Icon.ArrowRight className="h-4 w-4" /></Button>}
            >
              <div className="grid gap-6 md:grid-cols-2">
                <Card className="p-6 md:p-8">
                  <div className="text-xl font-semibold">How we approach a project</div>
                  <div className="mt-5 grid gap-4 text-sm leading-relaxed text-black/65">
                    <p>Star & Brass Group approaches custom homebuilding with the belief that premium homes require premium process. We do not view process as bureaucracy. We view it as the framework that protects quality, budget, schedule, and client confidence.</p>
                    <p>Our role is to function as a builder-partner that brings clarity to complex projects, identifies risk early, and creates a more professional building experience from preconstruction through closeout.</p>
                    <div className="mt-2 flex justify-end">
                      <div className="w-40 opacity-20 md:w-48">
                        <img src="logo.png" alt="Star & Brass Group logo" className="h-auto w-full object-contain" />
                      </div>
                    </div>
                  </div>
                </Card>
                <ProcessCards />
              </div>

              <div className="mt-6 grid gap-4 md:grid-cols-2">
                <Card className="p-6">
                  <div className="text-sm font-semibold">Early alignment</div>
                  <div className="mt-2 text-sm leading-relaxed text-black/65">Successful projects are often won or lost before the first major trade mobilizes. We place strong value on early review of plans, specifications, site conditions, owner priorities, finish expectations, and likely cost drivers so issues are addressed before they become expensive.</div>
                </Card>
                <Card className="p-6">
                  <div className="text-sm font-semibold">Communication</div>
                  <div className="mt-2 text-sm leading-relaxed text-black/65">Homeowners, architects, interior designers, landscape architects, engineers, and consultants should not have to guess where a project stands. We believe it is our job to surface issues early, communicate clearly, and keep the team aligned as the project moves forward.</div>
                </Card>
                <Card className="p-6">
                  <div className="text-sm font-semibold">Design stewardship</div>
                  <div className="mt-2 text-sm leading-relaxed text-black/65">Luxury custom homes rise or fall on execution of detail, alignment, proportion, and material transitions. We work to actively protect design intent in the field rather than let it erode during construction.</div>
                </Card>
                <Card className="p-6">
                  <div className="text-sm font-semibold">Problem-solving mindset</div>
                  <div className="mt-2 text-sm leading-relaxed text-black/65">Construction always involves friction. Our philosophy is that problems should be addressed early, calmly, and directly, with ownership of issues and a bias toward solutions rather than excuses.</div>
                </Card>
              </div>
            </SectionWrap>
          );
        }

        function CapabilitiesPage({ go }) {
          return (
            <SectionWrap
              eyebrow="Capabilities"
              title="What we build"
              subtitle="Purpose-built for high-end residential work across DFW’s luxury custom market, with the process and coordination required for architect-led projects and demanding clients."
              right={<Button variant="ghost" onClick={() => go("contact")}>Talk scope <Icon.ArrowRight className="h-4 w-4" /></Button>}
            >
              <div className="grid gap-4 md:grid-cols-2">
                <Card className="p-6"><div className="text-sm font-semibold">Luxury custom homes</div><div className="mt-2 text-sm leading-relaxed text-black/65">Purpose-built for high-end custom residential projects requiring disciplined execution and strong coordination.</div></Card>
                <Card className="p-6"><div className="text-sm font-semibold">Major renovations and additions</div><div className="mt-2 text-sm leading-relaxed text-black/65">Selective work where structure, sequencing, and finish protection matter as much as aesthetics.</div></Card>
                <Card className="p-6 md:col-span-2"><div className="text-sm font-semibold">Team integration</div><div className="mt-2 text-sm leading-relaxed text-black/65">Architects, interior designers, landscape architects, engineers, homeowners, and trade partners all need to stay aligned. We are built to work inside that structure.</div></Card>
              </div>
            </SectionWrap>
          );
        }

        function StandardsPage({ go }) {
          return (
            <SectionWrap
              eyebrow="Standards"
              title="Preconstruction, budgeting, and standards"
              subtitle="A premium home cannot be managed with rough assumptions, vague allowances, or reactive change-order practices."
              right={<Button variant="ghost" onClick={() => go("contact")}>Contact us <Icon.ArrowRight className="h-4 w-4" /></Button>}
            >
              <StandardsGrid />
            </SectionWrap>
          );
        }

        function PeoplePage({ go }) {
          return (
            <SectionWrap
              eyebrow="People"
              title="Founders"
              subtitle="Two founders with complementary strengths in business development, preconstruction, operations, field leadership, and relationship-driven execution."
              right={<Button variant="ghost" onClick={() => go("contact")}>Get in touch <Icon.ArrowRight className="h-4 w-4" /></Button>}
            >
              <Bios />
            </SectionWrap>
          );
        }

        function ContactPage() {
          return (
            <SectionWrap
              eyebrow="Contact"
              title="Let’s talk about your project"
              subtitle="No matter what stage you are in, it is never too early to start the conversation."
            >
              <div className="grid gap-6 md:grid-cols-[.9fr_1.1fr]">
                <Card className="p-6 md:p-8">
                  <div className="text-xl font-semibold">What helps upfront</div>
                  <div className="mt-5 grid gap-3 text-sm text-black/68">
                    {[
                      "Property location",
                      "New build or major renovation",
                      "Architect or design team status",
                      "Target start window",
                      "Any early budget expectations"
                    ].map((item) => (
                      <div key={item} className="rounded-2xl border border-black/10 bg-neutral-50 px-4 py-3">{item}</div>
                    ))}
                  </div>
                </Card>
                <div className="grid gap-6">
                  <ContactCards />
                  <Card className="p-6">
                    <div className="flex items-center gap-3 text-sm text-black/70">
                      <Icon.Globe className="h-5 w-5" />
                      <a href={BRAND.websiteHref} className="hover:text-black">{BRAND.websiteDisplay}</a>
                    </div>
                    <div className="mt-4 text-sm leading-relaxed text-black/65">{BRAND.serviceArea}</div>
                  </Card>
                </div>
              </div>
            </SectionWrap>
          );
        }

        function App() {
          const nav = useMemo(() => ([
            { id: "home", label: "Home" },
            { id: "approach", label: "Approach" },
            { id: "capabilities", label: "Capabilities" },
            { id: "standards", label: "Standards" },
            { id: "people", label: "People" },
            { id: "contact", label: "Contact" },
          ]), []);

          const [page, setPage] = useState("home");

          return (
            <div className="min-h-screen bg-white text-black">
              <header className="sticky top-0 z-50 border-b border-black/10 bg-white/90 backdrop-blur">
                <div className="mx-auto flex max-w-[88rem] items-center justify-between gap-4 px-4 py-4">
                  <button onClick={() => setPage("home")} className="text-left no-select">
                    <div className="text-lg font-semibold tracking-tight">{BRAND.name}</div>
                    <div className="text-sm text-black/50">{BRAND.city}</div>
                  </button>

                  <nav className="hidden items-center gap-6 md:flex">
                    {nav.map((n) => (
                      <button
                        key={n.id}
                        onClick={() => setPage(n.id)}
                        className={cn(
                          "text-[11px] font-semibold uppercase tracking-[0.22em] transition no-select",
                          page === n.id ? "text-black" : "text-black/45 hover:text-black"
                        )}
                      >
                        {n.label}
                      </button>
                    ))}
                  </nav>

                  <div className="flex items-center gap-2">
                    <Button variant="ghost" href={BRAND.phoneHref}><Icon.Phone className="h-4 w-4" />Call</Button>
                    <Button variant="primary" onClick={() => setPage("contact")}>Contact</Button>
                  </div>
                </div>
              </header>

              <main>
                {page === "home" && <HomePage go={setPage} />}
                {page === "approach" && <ApproachPage go={setPage} />}
                {page === "capabilities" && <CapabilitiesPage go={setPage} />}
                {page === "standards" && <StandardsPage go={setPage} />}
                {page === "people" && <PeoplePage go={setPage} />}
                {page === "contact" && <ContactPage />}
              </main>

              <footer className="border-t border-black/10 bg-white">
                <div className="mx-auto max-w-[88rem] px-4 py-10">
                  <div className="grid gap-6 md:grid-cols-2 md:items-center">
                    <div>
                      <div className="text-sm font-semibold">{BRAND.name}</div>
                      <div className="mt-1 text-xs uppercase tracking-[0.16em] text-black/45">Dallas-based | Luxury custom residential | Serving DFW</div>
                    </div>
                    <div className="flex flex-wrap gap-4 md:justify-end">
                      {nav.map((n) => (
                        <button
                          key={n.id}
                          onClick={() => setPage(n.id)}
                          className="text-[11px] uppercase tracking-[0.22em] text-black/45 hover:text-black no-select"
                        >
                          {n.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      } catch (err) {
        renderFatalError(err);
      }
    </script>
  </body>
</html>
